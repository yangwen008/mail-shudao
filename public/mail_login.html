<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 蜀道AI邮箱</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%); overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 420px; padding: 40px; background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4); }
        .brand-header { text-align: center; margin-bottom: 35px; }
        .brand-title { font-size: 26px; font-weight: 800; color: #fff; letter-spacing: 2px; background: linear-gradient(to right, #ffffff, #93c5fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .form-group { position: relative; margin-bottom: 22px; }
        .form-label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 6px; }
        .form-input { width: 100%; padding: 12px 16px; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: #fff; font-size: 15px; outline: none; }
        .suffix-tag { position: absolute; right: 16px; color: #64748b; font-size: 14px; font-weight: 600; pointer-events: none; }
        .btn-primary { width: 100%; padding: 13px; background: linear-gradient(90deg, #2563eb 0%, #1d4ed8 100%); color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
<div id="app">
    <div class="login-card">
        <div class="brand-header"><h1 class="brand-title">蜀道AI邮箱</h1></div>
        <form @submit.prevent="handleSubmit">
            <div class="form-group">
                <label class="form-label">邮局账号</label>
                <div class="input-wrapper">
                    <input type="text" v-model="formData.username" class="form-input" required style="padding-right: 110px;">
                    <span class="suffix-tag">@shudao.ai</span>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">安全密码</label>
                <input type="password" v-model="formData.password" class="form-input" required>
            </div>
            <button type="submit" class="btn-primary" :disabled="loading">{{ loading ? '正在验证安全凭证...' : '安全登录' }}</button>
        </form>
    </div>
</div>
<script>
    const API_BASE = window.location.origin;
    new Vue({
        el: '#app',
        data: { loading: false, formData: { username: '', password: '' } },
        methods: {
            handleSubmit() {
                this.loading = true;
                axios.post(`${API_BASE}/api/login`, { username: this.formData.username.trim(), password: this.formData.password })
                .then(res => {
                    localStorage.setItem('mail_username', this.formData.username.trim());
                    window.location.href = '/mail_index.html'; 
                })
                .catch(err => { this.loading = false; alert('登录鉴权失败'); });
            }
        }
    });
</script>
</body>
</html>
