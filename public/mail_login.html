<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 蜀道AI邮箱</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { 
            height: 100%; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: -10%;
            left: -10%;
            z-index: 0;
        }
        .bg-glow-bottom {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(147, 51, 234, 0.1) 0%, rgba(0,0,0,0) 70%);
            bottom: -5%;
            right: -5%;
            z-index: 0;
        }
        .login-card {
            position: relative;
            z-index: 10;
            width: 420px;
            padding: 40px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }
        .brand-header {
            text-align: center;
            margin-bottom: 35px;
        }
        .brand-title {
            font-size: 26px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 2px;
            margin-bottom: 8px;
            background: linear-gradient(to right, #ffffff, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .brand-subtitle {
            font-size: 12px;
            color: #94a3b8;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        .form-group {
            position: relative;
            margin-bottom: 22px;
        }
        .form-label {
            display: block;
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.25s ease;
        }
        .form-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
            background: rgba(15, 23, 42, 0.8);
        }
        .suffix-tag {
            position: absolute;
            right: 16px;
            color: #64748b;
            font-size: 14px;
            font-weight: 600;
            pointer-events: none;
        }
        .btn-primary {
            width: 100%;
            padding: 13px;
            background: linear-gradient(90deg, #2563eb 0%, #1d4ed8 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }
        .btn-primary:hover {
            opacity: 0.95;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.3);
        }
        .card-footer {
            margin-top: 25px;
            text-align: center;
            font-size: 13px;
            color: #64748b;
        }
        .card-footer a {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 500;
            margin-left: 5px;
        }
        .card-footer a:hover {
            color: #93c5fd;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div id="app">
    <div class="bg-glow"></div>
    <div class="bg-glow-bottom"></div>

    <div class="login-card">
        <div class="brand-header">
            <h1 class="brand-title">蜀道AI邮箱</h1>
            <p class="brand-subtitle">SHUDAO.AI MAIL SYSTEM</p>
        </div>

        <form @submit.prevent="handleSubmit">
            <div class="form-group">
                <label class="form-label">邮局账号</label>
                <div class="input-wrapper">
                    <input type="text" v-model="formData.username" class="form-input" placeholder="输入用户名" required style="padding-right: 110px;">
                    <span class="suffix-tag">@shudao.ai</span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">安全密码</label>
                <input type="password" v-model="formData.password" class="form-input" placeholder="请输入密码" required>
            </div>

            <button type="submit" class="btn-primary" :disabled="loading">
                {{ loading ? '正在验证安全凭证...' : (isRegisterMode ? '建立新凭证 (注册)' : '安全登录') }}
            </button>
        </form>

        <div class="card-footer">
            <span>{{ isRegisterMode ? '已有系统账号?' : '还没有邮局账号?' }}</span>
            <a href="#" @click.prevent="isRegisterMode = !isRegisterMode">
                {{ isRegisterMode ? '立即登录' : '注册新账号' }}
            </a>
        </div>
    </div>
</div>

<script>
    const API_BASE = window.location.origin;

    new Vue({
        el: '#app',
        data: {
            isRegisterMode: false,
            loading: false,
            formData: { username: '', password: '' }
        },
        methods: {
            handleSubmit() {
                if (this.loading) return;
                this.loading = true;
                const targetPath = this.isRegisterMode ? '/api/register' : '/api/login';
                
                axios.post(`${API_BASE}${targetPath}`, {
                    username: this.formData.username.trim(),
                    password: this.formData.password
                })
                .then(res => {
                    this.loading = false;
                    if (this.isRegisterMode) {
                        alert('蜀道AI邮局凭证创建成功！请直接点击登录。');
                        this.isRegisterMode = false;
                    } else {
                        localStorage.setItem('mail_username', this.formData.username.trim());
                        window.location.href = '/index.html'; 
                    }
                })
                .catch(err => {
                    this.loading = false;
                    const errMsg = err.response && err.response.data && err.response.data.message ? err.response.data.message : '中继异常';
                    alert((this.isRegisterMode ? '注册失败：' : '登录失败：') + errMsg);
                });
            }
        }
    });
</script>
</body>
</html>
