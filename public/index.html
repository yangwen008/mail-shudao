<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收件箱 - 蜀道AI邮箱</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Lucida Grande", "Lucida Sans Unicode", Helvetica, Arial, Verdana, sans-serif; font-size: 14px; color: #000; background: #fff; }
        #app { display: flex; height: 100vh; flex-direction: column; }
        .header { height: 50px; background: #eff4f8; border-bottom: 1px solid #d2dae2; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .logo-area { font-size: 18px; font-weight: bold; color: #2b7ac6; display: flex; align-items: center; gap: 5px; }
        .user-info { color: #666; font-size: 12px; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        
        .sidebar { width: 180px; background: #f3f7fa; border-right: 1px solid #d2dae2; padding: 10px 5px; overflow-y: auto; }
        .btn-write { width: 100%; height: 32px; background: #2b7ac6; color: white; border: 1px solid #1a5c9f; border-radius: 3px; cursor: pointer; font-weight: bold; font-size: 14px; margin-bottom: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .btn-write:hover { background: #3c8bcf; }
        .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; cursor: pointer; color: #000; border-radius: 3px; margin-bottom: 2px; }
        .menu-item:hover { background: #e2ecf5; color: #1e548e; }
        .menu-item.active { background: #3278b3; color: white !important; font-weight: bold; }
        .menu-badge { font-weight: bold; font-size: 12px; color: #2b7ac6; }
        .menu-item.active .menu-badge { color: white; }
        .menu-count-grey { color: #999; font-size: 12px; }

        .content { flex: 1; display: flex; flex-direction: column; background: #fff; overflow: hidden; }
        .toolbar { height: 35px; background: #f2f2f2; border-bottom: 1px solid #ccc; display: flex; align-items: center; padding: 0 10px; gap: 10px; }
        .btn-tool { padding: 2px 8px; background: #fff; border: 1px solid #bbb; border-radius: 2px; cursor: pointer; font-size: 12px; }
        .btn-tool:hover { border-color: #888; }
        
        .list-container { flex: 1; overflow-y: auto; }
        .mail-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .mail-table tr { border-bottom: 1px solid #e9e9e9; cursor: pointer; font-size: 13px; }
        .mail-table tr:hover { background: #f5f9fd; }
        .mail-table td { padding: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .col-star { width: 35px; text-align: center; color: #ccc; font-size: 16px; }
        .col-star.starred { color: #ff9800; }
        .col-from { width: 160px; color: #333; }
        .col-subject { color: #1e548e; }
        .col-time { width: 100px; text-align: right; color: #888; font-size: 12px; }
        .empty-tip { padding: 40px; text-align: center; color: #999; }

        .view-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .mail-header-box { border-bottom: 1px solid #ddd; padding-bottom: 15px; }
        .mail-title { font-size: 18px; font-weight: bold; margin-bottom: 10px; color: #333; }
        .mail-meta { font-size: 12px; color: #666; line-height: 1.8; }
        .mail-body { font-size: 14px; line-height: 1.6; color: #222; white-space: pre-wrap; padding: 10px 0; }
        
        .form-group { display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #eee; padding: 8px 0; }
        .form-label { width: 60px; color: #666; font-size: 13px; }
        .form-input { flex: 1; border: none; outline: none; font-size: 14px; padding: 4px; }
        .form-textarea { flex: 1; height: 260px; border: 1px solid #ddd; padding: 10px; font-size: 14px; resize: none; outline: none; border-radius: 3px; }

        /* 💡 附件展示区样式 */
        .attachment-zone { background: #f8fafc; border: 1px dashed #cbd5e1; padding: 12px; border-radius: 6px; margin-top: 10px; }
        .attachment-item { display: inline-flex; align-items: center; background: #fff; border: 1px solid #e2e8f0; padding: 4px 10px; border-radius: 4px; font-size: 12px; margin-right: 8px; margin-bottom: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .btn-remove-file { margin-left: 8px; color: #ef4444; cursor: pointer; font-weight: bold; }
        .btn-remove-file:hover { color: #b91c1c; }
    </style>
</head>
<body>

<div id="app">
    <div class="header">
        <div class="logo-area">
            <span>MФiL</span> <span style="font-size: 13px; font-weight: normal; color: #666;">蜀道AI邮箱</span>
        </div>
        <div class="user-info">
            <strong>{{ username }}@shudao.ai</strong> | <a href="#" @click="logout" style="color: #2b7ac6; text-decoration: none;">退出</a>
        </div>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <button @click="switchToCompose" class="btn-write">📝 写信</button>
            
            <div class="menu-item" :class="{ active: currentFilter === 'inbox' && viewMode === 'list' }" @click="changeFilter('inbox')">
                <span>📁 收件箱</span>
                <span class="menu-badge">{{ currentFilter === 'inbox' ? emails.length : '' }}</span>
            </div>
            
            <div class="menu-item" :class="{ active: currentFilter === 'vip' && viewMode === 'list' }" @click="changeFilter('vip')">
                <span>🔖 重要联系人</span>
            </div>
            
            <div class="menu-item" :class="{ active: currentFilter === 'starred' && viewMode === 'list' }" @click="changeFilter('starred')">
                <span>⭐ 星标邮件</span>
            </div>
            
            <div class="menu-item" :class="{ active: currentFilter === 'group' && viewMode === 'list' }" @click="changeFilter('group')">
                <span>👥 群邮件</span>
                <span class="menu-count-grey">0</span>
            </div>
            
            <div class="menu-item" :class="{ active: currentFilter === 'sent' && viewMode === 'list' }" @click="changeFilter('sent')">
                <span>▲ 已发送</span>
                <span class="menu-badge" style="color: #2b7ac6;">{{ currentFilter === 'sent' ? emails.length : '' }}</span>
            </div>
            
            <div class="menu-item" :class="{ active: currentFilter === 'draft' && viewMode === 'list' }" @click="changeFilter('draft')">
                <span>📄 草稿箱</span>
            </div>
            
            <div class="menu-item" :class="{ active: currentFilter === 'trash' && viewMode === 'list' }" @click="changeFilter('trash')">
                <span>🗑️ 已删除</span>
                <span class="menu-badge" style="color: #888;">{{ currentFilter === 'trash' ? emails.length : '' }}</span>
            </div>
        </div>

        <div class="content">
            <template v-if="viewMode === 'list'">
                <div class="toolbar">
                    <button class="btn-tool" @click="fetchEmails">刷新</button>
                </div>
                <div class="list-container">
                    <div v-if="emails.length === 0" class="empty-tip">暂无邮件</div>
                    <table v-else class="mail-table">
                        <tbody>
                            <tr v-for="mail in emails" :key="mail.id">
                                <td class="col-star" :class="{ starred: mail.is_starred }" @click.stop="toggleStar(mail)">
                                    {{ mail.is_starred ? '★' : '☆' }}
                                </td>
                                <td class="col-from" @click="readMail(mail)">
                                    {{ currentFilter === 'sent' ? '投递至: ' + mail.to_address.replace('_deleted', '') : (mail.from_address ? mail.from_address.replace('_deleted', '') : '') }}
                                </td>
                                <td class="col-subject" @click="readMail(mail)">
                                    {{ mail.subject }} - <span style="color: #888; font-weight: normal;">{{ mail.body_text }}</span>
                                </td>
                                <td class="col-time" @click="readMail(mail)">
                                    {{ formatTime(mail.received_at) }}
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </template>

            <template v-else-if="viewMode === 'read'">
                <div class="toolbar">
                    <button class="btn-tool" @click="viewMode = 'list'">返回列表</button>
                    <button class="btn-tool" @click="deleteMail(activeMail)" :style="currentFilter === 'trash' ? 'color: red; font-weight: bold;' : ''">
                        {{ currentFilter === 'trash' ? '💥 彻底删除 (不可逆)' : '🗑️ 删除' }}
                    </button>
                </div>
                <div class="view-container">
                    <div class="mail-header-box">
                        <div class="mail-title">{{ activeMail.subject }}</div>
                        <div class="mail-meta">
                            <div><strong>发件人：</strong>{{ activeMail.from_address.replace('_deleted', '') }}</div>
                            <div><strong>收件人：</strong>{{ activeMail.to_address.replace('_deleted', '') }}</div>
                            <div><strong>时 间：</strong>{{ activeMail.received_at }}</div>
                        </div>
                    </div>
                    <div class="mail-body">{{ activeMail.body_text }}</div>
                </div>
            </template>

            <template v-else-if="viewMode === 'compose'">
                <div class="toolbar">
                    <button class="btn-tool" @click="sendMail" style="background: #2b7ac6; color: white; font-weight: bold; border-color: #1a5c9f;">立即发送</button>
                    <button class="btn-tool" @click="triggerFileInput">📎 添加附件</button>
                    <input type="file" ref="fileInput" @change="handleFileChange" style="display: none;" multiple>
                    <button class="btn-tool" @click="viewMode = 'list'">取消</button>
                </div>
                <div class="view-container">
                    <div class="form-group">
                        <span class="form-label">收件人</span>
                        <input type="text" v-model="composeData.to" class="form-input" placeholder="输入收件人地址...">
                    </div>
                    <div class="form-group">
                        <span class="form-label">主题</span>
                        <input type="text" v-model="composeData.subject" class="form-input" placeholder="输入邮件主题...">
                    </div>
                    
                    <div v-if="attachedFiles.length > 0" class="attachment-zone">
                        <div style="font-size: 12px; color: #64748b; margin-bottom: 6px; font-weight: bold;">已添加附件：</div>
                        <div class="attachment-item" v-for="(file, index) in attachedFiles" :key="index">
                            <span>📄 {{ file.filename }} ({{ (file.size / 1024).toFixed(1) }} KB)</span>
                            <span class="btn-remove-file" @click="removeFile(index)">×</span>
                        </div>
                    </div>

                    <div style="display: flex; flex: 1; margin-top: 10px;">
                        <textarea v-model="composeData.content" class="form-textarea" placeholder="输入正文内容..."></textarea>
                    </div>
                </div>
            </template>
        </div>
    </div>
</div>

<script>
    const API_BASE = window.location.origin;

    if (!localStorage.getItem('mail_username')) {
        window.location.href = '/login.html';
    }

    new Vue({
        el: '#app',
        data: {
            username: localStorage.getItem('mail_username') || 'admin',
            currentFilter: 'inbox',
            viewMode: 'list',
            emails: [],
            activeMail: null,
            composeData: { to: '', subject: '', content: '' },
            attachedFiles: [] // 💡 存放转换好 Base64 的附件数组
        },
        created() {
            if(localStorage.getItem('mail_username')) {
                this.fetchEmails();
            }
        },
        methods: {
            fetchEmails() {
                axios.get(`${API_BASE}/api/emails`, {
                    params: { username: this.username, filter: this.currentFilter }
                })
                .then(res => { this.emails = res.data; })
                .catch(err => { alert('获取邮件故障: ' + err.message); });
            },
            changeFilter(filterType) {
                this.currentFilter = filterType;
                this.viewMode = 'list';
                this.fetchEmails();
            },
            switchToCompose() {
                this.composeData = { to: '', subject: '', content: '' };
                this.attachedFiles = [];
                this.viewMode = 'compose';
            },
            readMail(mail) {
                this.activeMail = mail;
                this.viewMode = 'read';
            },
            triggerFileInput() {
                this.$refs.fileInput.click();
            },
            // 💡 附件核心技术段：抓取物理文件，利用 FileReader 绞碎切片为 Base64 文本
            handleFileChange(event) {
                const files = event.target.files;
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    const reader = new FileReader();
                    
                    reader.onload = (e) => {
                        // e.target.result 的格式类似为 "data:image/png;base64,iVBORw0KGgo..."
                        const rawResult = e.target.result;
                        const base64Data = rawResult.split(',')[1]; // 精准截取真实的文本部分
                        
                        this.attachedFiles.push({
                            filename: file.name,
                            content: base64Data,
                            size: file.size
                        });
                    };
                    reader.readAsDataURL(file); // 触发 Base64 数据读取
                }
            },
            removeFile(index) {
                this.attachedFiles.splice(index, 1);
            },
            sendMail() {
                if (!this.composeData.to || !this.composeData.content) {
                    alert('请补全收件人和内容');
                    return;
                }
                axios.post(`${API_BASE}/api/send`, {
                    from_user: this.username,
                    to_email: this.composeData.to,
                    subject: this.composeData.subject,
                    content: this.composeData.content,
                    attachments: this.attachedFiles // 💡 顺带把切片完成的附件文本丢给后端
                })
                .then(res => {
                    alert(res.data.message || '发送成功！');
                    this.changeFilter('sent');
                })
                .catch(err => {
                    const errMsg = err.response && err.response.data ? err.response.data.message : err.message;
                    alert('发送遭遇失败: ' + errMsg);
                });
            },
            toggleStar(mail) {
                const targetValue = mail.is_starred ? 0 : 1;
                mail.is_starred = targetValue;
                axios.patch(`${API_BASE}/api/emails/status`, { id: mail.id, field: 'is_starred', value: targetValue });
            },
            deleteMail(mail) {
                if (this.currentFilter === 'trash') {
                    if (!confirm('确定要永久删除该邮件吗？')) return;
                    axios.patch(`${API_BASE}/api/emails/status`, { id: mail.id, field: 'permanent_delete', value: 'true' })
                    .then(() => {
                        alert('邮件已永久粉碎！');
                        this.viewMode = 'list';
                        this.fetchEmails();
                    });
                } else {
                    axios.patch(`${API_BASE}/api/emails/status`, { id: mail.id, field: 'execute_delete', value: this.username })
                    .then(() => {
                        alert('邮件已移入回收站！');
                        this.viewMode = 'list';
                        this.fetchEmails();
                    });
                }
            },
            formatTime(timeStr) {
                if (!timeStr) return '';
                const date = new Date(timeStr);
                return (date.getMonth() + 1) + '月' + date.getDate() + '日';
            },
            logout() { 
                localStorage.removeItem('mail_username');
                window.location.href = '/login.html';
            }
        }
    });
</script>
</body>
</html>
