<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收件箱 - 蜀道AI邮箱</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Lucida Grande", "Lucida Sans Unicode", Helvetica, Arial, Verdana, sans-serif; font-size: 14px; color: #1e293b; background: #fff; }
        #app { display: flex; height: 100vh; flex-direction: column; }
        
        /* 顶部导航精致化 */
        .header { height: 56px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
        .logo-area { font-size: 20px; font-weight: 800; color: #1e40af; display: flex; align-items: center; gap: 8px; letter-spacing: 0.5px; }
        .user-info { color: #64748b; font-size: 13px; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        
        /* 💡 左侧菜单栏像素级优化 */
        .sidebar { width: 200px; background: #f1f5f9; border-right: 1px solid #e2e8f0; padding: 16px 8px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
        
        /* 写信大按钮重塑 */
        .btn-write { width: 100%; height: 38px; background: #2563eb; color: white; border: 1px solid #1d4ed8; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; margin-bottom: 16px; box-shadow: 0 2px 4px rgba(37, 99, 235, 0.15); transition: all 0.2s ease; }
        .btn-write:hover { background: #1d4ed8; box-shadow: 0 4px 8px rgba(37, 99, 235, 0.25); }
        
        /* 💡 核心对齐逻辑：确保每个小图标容器长宽绝对一致 */
        .menu-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; cursor: pointer; color: #334155; border-radius: 6px; transition: all 0.15s ease; text-decoration: none; font-weight: 500; }
        .menu-item-left { display: flex; align-items: center; gap: 10px; }
        .menu-icon { width: 22px; text-align: center; font-size: 15px; display: inline-block; }
        
        .menu-item:hover { background: #e2e8f0; color: #0f172a; }
        
        /* 💡 激活选中状态重塑，增加左侧蓝色呼吸条提示 */
        .menu-item.active { background: #2563eb; color: white !important; font-weight: bold; box-shadow: 0 2px 4px rgba(37, 99, 235, 0.1); }
        .menu-badge { font-weight: bold; font-size: 12px; color: #2563eb; background: #dbeafe; padding: 2px 6px; border-radius: 10px; }
        .menu-item.active .menu-badge { color: #2563eb; background: #ffffff; }
        .menu-count-grey { color: #94a3b8; font-size: 12px; font-weight: normal; }
        .menu-item.active .menu-count-grey { color: rgba(255, 255, 255, 0.7); }

        /* 右侧内容业务区 */
        .content { flex: 1; display: flex; flex-direction: column; background: #fff; overflow: hidden; }
        .toolbar { height: 42px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; padding: 0 16px; gap: 8px; }
        .btn-tool { padding: 4px 12px; background: #fff; border: 1px solid #cbd5e1; border-radius: 4px; cursor: pointer; font-size: 12px; color: #334155; transition: all 0.1s ease; }
        .btn-tool:hover { border-color: #94a3b8; background: #f8fafc; }
        
        /* 邮件列表样式优化 */
        .list-container { flex: 1; overflow-y: auto; }
        .mail-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .mail-table tr { border-bottom: 1px solid #f1f5f9; cursor: pointer; font-size: 13px; transition: background 0.1s; }
        .mail-table tr:hover { background: #f8fafc; }
        .mail-table td { padding: 12px 16px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .col-star { width: 45px; text-align: center; color: #cbd5e1; font-size: 16px; }
        .col-star.starred { color: #f59e0b; }
        .col-from { width: 180px; color: #1e293b; font-weight: 500; }
        .col-subject { color: #2563eb; }
        .col-time { width: 100px; text-align: right; color: #64748b; font-size: 12px; }
        .empty-tip { padding: 60px; text-align: center; color: #94a3b8; font-size: 14px; }

        /* 读信与写信 */
        .view-container { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; background: #fff; }
        .mail-header-box { border-bottom: 1px solid #e2e8f0; padding-bottom: 20px; }
        .mail-title { font-size: 20px; font-weight: bold; margin-bottom: 12px; color: #0f172a; }
        .mail-meta { font-size: 13px; color: #475569; line-height: 2; }
        .mail-body { font-size: 14px; line-height: 1.7; color: #334155; white-space: pre-wrap; padding: 12px 0; }
        
        .form-group { display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #f1f5f9; padding: 10px 0; }
        .form-label { width: 60px; color: #475569; font-size: 13px; font-weight: 500; }
        .form-input { flex: 1; border: none; outline: none; font-size: 14px; padding: 4px; color: #0f172a; }

        /* 富文本工具栏精致化 */
        .editor-toolbar { display: flex; align-items: center; flex-wrap: wrap; background: #f8fafc; border: 1px solid #cbd5e1; border-bottom: none; padding: 8px; gap: 6px; border-top-left-radius: 6px; border-top-right-radius: 6px; }
        .editor-btn { background: none; border: none; padding: 6px 10px; cursor: pointer; font-size: 13px; font-weight: 600; border-radius: 4px; color: #475569; }
        .editor-btn:hover { background: #e2e8f0; color: #0f172a; }
        .editor-select { border: 1px solid #cbd5e1; background: #fff; padding: 4px 6px; font-size: 12px; border-radius: 4px; outline: none; color: #334155; }
        .editor-color-picker { width: 24px; height: 24px; border: none; background: none; cursor: pointer; padding: 0; }
        .editor-container { flex: 1; border: 1px solid #cbd5e1; padding: 16px; font-size: 14px; overflow-y: auto; outline: none; background: #fff; min-height: 280px; border-bottom-left-radius: 6px; border-bottom-right-radius: 6px; color: #334155; line-height: 1.6; }

        .attachment-zone { background: #f8fafc; border: 1px dashed #cbd5e1; padding: 12px; border-radius: 6px; margin-top: 8px; }
        .attachment-item { display: inline-flex; align-items: center; background: #fff; border: 1px solid #e2e8f0; padding: 6px 12px; border-radius: 4px; font-size: 12px; margin-right: 8px; margin-bottom: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.02); }
        .btn-remove-file { margin-left: 10px; color: #ef4444; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="app">
    <div class="header">
        <div class="logo-area">
            <span style="color: #2563eb;">MФiL</span> <span>蜀道AI邮箱</span>
        </div>
        <div class="user-info">
            <strong>{{ username }}@shudao.ai</strong> | <a href="#" @click="logout" style="color: #2563eb; text-decoration: none; font-weight: 500;">退出</a>
        </div>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <button @click="switchToCompose" class="btn-write">📝 写信</button>
            
            <div class="menu-item" :class="{ active: currentFilter === 'inbox' && viewMode === 'list' }" @click="changeFilter('inbox')">
                <div class="menu-item-left">
                    <span class="menu-icon">📁</span>
                    <span>收件箱</span>
                </div>
                <span class="menu-badge" v-if="currentFilter === 'inbox'">{{ emails.length }}</span>
            </div>
            
            <div class="menu-item" :class="{ active: currentFilter === 'vip' && viewMode === 'list' }" @click="changeFilter('vip')">
                <div class="menu-item-left">
                    <span class="menu-icon">🔖</span>
                    <span>重要联系人</span>
                </div>
            </div>
            
            <div class="menu-item" :class="{ active: currentFilter === 'starred' && viewMode === 'list' }" @click="changeFilter('starred')">
                <div class="menu-item-left">
                    <span class="menu-icon">⭐
