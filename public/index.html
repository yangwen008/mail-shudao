<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蜀道AI控制台 - 全功能邮件系统</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --border: #e2e8f0; --text: #334155; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin:0; padding:0; display: flex; height: 100vh; overflow: hidden; }
        .auth-container { max-width: 400px; margin: auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); width: 90%; }
        .input-box { width: 100%; padding: 12px; margin: 8px 0; box-sizing: border-box; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; }
        .btn { background: var(--primary); color: #fff; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; font-weight: 500; }
        .btn-alt { background: #10b981; margin-top: 8px; }
        .layout { display: flex; width: 100%; height: 100%; }
        .sidebar { width: 230px; background: #0f172a; color: #f8fafc; padding: 20px 10px; display: flex; flex-direction: column; gap: 8px; }
        .sidebar h2 { font-size: 15px; margin: 0 0 20px 10px; color: #38bdf8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;}
        .menu-item { padding: 12px 15px; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .menu-item:hover, .menu-item.active { background: #1e293b; color: #38bdf8; }
        .mail-master { width: 360px; border-right: 1px solid var(--border); background: #fff; display: flex; flex-direction: column; }
        .search-bar { padding: 15px; border-bottom: 1px solid var(--border); }
        .list-container { flex: 1; overflow-y: auto; }
        .mail-card { padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .mail-card:hover { background: #f1f5f9; }
        .mail-card.unread { font-weight: bold; border-left: 4px solid var(--primary); }
        .mail-card .meta { font-size: 12px; color: #64748b; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .mail-card .subj { font-size: 14px; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .mail-detail { flex: 1; background: #fff; display: flex; flex-direction: column; padding: 30px; overflow-y: auto; }
        .detail-header { border-bottom: 2px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; }
        .actions { margin-top: 15px; display: flex; gap: 10px; }
        .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 4px; background: #e2e8f0; color: #334155; border: none; cursor: pointer; }
        .btn-sm:hover { background: #cbd5e1; }
        .compose-box { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 600px; }
    </style>
</head>
<body>

<div id="auth-view" class="auth-container">
    <h2 style="margin-top:0; text-align: center; color: #1e293b;">📬 自建云邮件系统</h2>
    <input type="text" id="username" class="input-box" placeholder="输入邮箱账户前缀 (如 info)">
    <input type="password" id="password" class="input-box" placeholder="请输入安全密码">
    <button class="btn" onclick="handleAuth('login')">安全登录</button>
    <button class="btn btn-alt" onclick="handleAuth('register')">注册新账号</button>
</div>

<div id="main-view" class="layout" style="display: none;">
    <div class="sidebar">
        <h2 id="user-display">加载中...</h2>
        <div class="menu-item active" id="m-inbox" onclick="switchTab('inbox')">📥 收件箱</div>
        <div class="menu-item" id="m-starred" onclick="switchTab('starred')">⭐ 星标收藏</div>
        <div class="menu-item" id="m-trash" onclick="switchTab('trash')">🗑️ 回收站</div>
        <div class="menu-item" id="m-compose" onclick="switchTab('compose')" style="margin-top: 20px; background: var(--primary); text-align:center; font-weight:bold;">📝 撰写新邮件</div>
        <div class="menu-item" onclick="logout()" style="margin-top: auto; color: #ef4444;">🚪 退出登录</div>
    </div>

    <div class="mail-master" id="list-pane">
        <div class="search-bar">
            <input type="text" id="search-input" class="input-box" placeholder="🔍 搜索发件人、主题..." onkeyup="if(event.key==='Enter') loadEmails()">
        </div>
        <div class="list-container" id="list-container"></div>
    </div>

    <div class="mail-detail" id="content-pane">
        <div id="default-tip"><h3>请选择左侧邮件进行阅读</h3></div>
        
        <div id="detail-view" style="display: none;">
            <div class="detail-header">
                <h1 id="d-subject">(无主题)</h1>
                <div id="d-meta" style="color:#64748b; font-size:14px;"></div>
                <div class="actions">
                    <button class="btn-sm" id="btn-read-toggle" onclick="toggleStatus('is_read')">标记未读</button>
                    <button class="btn-sm" id="btn-star-toggle" onclick="toggleStatus('is_starred')">添加星标</button>
                    <button class="btn-sm" style="background:#fee2e2; color:#ef4444;" id="btn-delete-toggle" onclick="toggleStatus('is_deleted')">移到回收站</button>
                </div>
            </div>
            <div id="d-body" style="white-space: pre-wrap; line-height: 1.6; font-size: 15px; color:#1e293b;"></div>
        </div>

        <div id="compose-view" class="compose-box" style="display: none;">
            <h2>📝 撰写新邮件</h2>
            <input type="text" id="c-to" class="input-box" placeholder="收件人邮箱 (如: example@qq.com)">
            <input type="text" id="c-subject" class="input-box" placeholder="邮件主题">
            <textarea id="c-content" class="input-box" style="height: 260px; resize: none;" placeholder="请输入邮件正文内容..."></textarea>
            <button class="btn" onclick="sendMail()" style="width: 140px;">🚀 立即发送</button>
        </div>
    </div>
</div>

<script>
    const API_BASE = window.location.origin;
    let currentUser = "", currentTab = "inbox", currentMail = null;

    async function handleAuth(type) {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        if(!username || !password) return alert('请完整填写账号和密码');

        const res = await fetch(`${API_BASE}/api/${type}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        
        if(type === 'register') return alert(data.message);
        if(data.success) {
            currentUser = username;
            document.getElementById('auth-view').style.display = 'none';
            document.getElementById('main-view').style.display = 'flex';
            document.getElementById('user-display').innerText = `📧 ${username}@${window.location.hostname}`;
            switchTab('inbox');
        } else {
            alert(data.message);
        }
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
        const activeMenu = document.getElementById(`m-${tab}`);
        if(activeMenu) activeMenu.classList.add('active');

        document.getElementById('default-tip').style.display = 'block';
        document.getElementById('detail-view').style.display = 'none';
        document.getElementById('compose-view').style.display = 'none';
        document.getElementById('list-pane').style.display = 'flex';

        if(tab === 'compose') {
            document.getElementById('list-pane').style.display = 'none';
            document.getElementById('default-tip').style.display = 'none';
            document.getElementById('compose-view').style.display = 'flex';
        } else {
            loadEmails();
        }
    }

    async function loadEmails() {
        const container = document.getElementById('list-container');
        container.innerHTML = '<p style="padding:15px; color:#64748b;">正在同步邮件列表...</p>';
        const q = document.getElementById('search-input').value;

        const res = await fetch(`${API_BASE}/api/emails?username=${currentUser}&filter=${currentTab}&q=${encodeURIComponent(q)}`);
        const mails = await res.json();

        if(mails.length === 0) {
            container.innerHTML = '<p style="padding:15px; color:#64748b;">暂无相关邮件</p>';
            return;
        }

        container.innerHTML = mails.map(m => `
            <div class="mail-card ${m.is_read===0?'unread':''}" onclick='selectMail(${JSON.stringify(m)})'>
                <div class="meta"><span>${m.from_address.split('@')[0]}</span><span>${new Date(m.received_at).toLocaleDateString()}</span></div>
                <div class="subj">${m.subject || '(无主题)'}</div>
                <div style="font-size:12px; color:#64748b; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${m.body_text || ''}</div>
            </div>
        `).join('');
    }

    function selectMail(mail) {
        currentMail = mail;
        document.getElementById('default-tip').style.display = 'none';
        document.getElementById('detail-view').style.display = 'block';
        
        document.getElementById('d-subject').innerText = mail.subject || '(无主题)';
        document.getElementById('d-meta').innerText = `发件人: ${mail.from_address}  |  时间: ${new Date(mail.received_at).toLocaleString()}`;
        document.getElementById('d-body').innerText = mail.body_text || '';

        document.getElementById('btn-read-toggle').innerText = mail.is_read === 1 ? "标记未读" : "标记已读";
        document.getElementById('btn-star-toggle').innerText = mail.is_starred === 1 ? "取消星标" : "添加星标";
        document.getElementById('btn-delete-toggle').innerText = mail.is_deleted === 1 ? "恢复到收件箱" : "移到回收站";

        if(mail.is_read === 0) updateStatus('is_read', 1);
    }

    async function toggleStatus(field) {
        if(!currentMail) return;
        const newValue = currentMail[field] === 1 ? 0 : 1;
        await updateStatus(field, newValue);
        
        document.getElementById('detail-view').style.display = 'none';
        document.getElementById('default-tip').style.display = 'block';
        loadEmails();
    }

    async function updateStatus(field, value) {
        await fetch(`${API_BASE}/api/emails/status`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: currentMail.id, field, value })
        });
        currentMail[field] = value;
    }

    async function sendMail() {
        const to_email = document.getElementById('c-to').value.trim();
        const subject = document.getElementById('c-subject').value.trim();
        const content = document.getElementById('c-content').value;

        if(!to_email || !subject || !content) return alert('发信信息不能为空');

        const res = await fetch(`${API_BASE}/api/send`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ from_user: currentUser, to_email, subject, content })
        });
        const data = await res.json();
        alert(data.message);
        if(data.success) {
            document.getElementById('c-to').value = '';
            document.getElementById('c-subject').value = '';
            document.getElementById('c-content').value = '';
            switchTab('inbox');
        }
    }

    function logout() { location.reload(); }
</script>
</body>
</html>
