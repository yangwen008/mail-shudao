<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蜀道AI邮箱</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Lucida Grande", "Lucida Sans Unicode", Helvetica, Arial, Verdana, sans-serif; font-size: 14px; color: #1e293b; background: #fff; }
        
        /* 💡 核心保险：加入 v-cloak 样式，只要 Vue 没接管，大括号和源码绝对不闪现 */
        [v-cloak] { display: none !important; }

        #app { display: flex; height: 100vh; flex-direction: column; }
        
        /* 顶部导航精致化 */
        .header { height: 56px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
        .logo-area { font-size: 20px; font-weight: 800; color: #2563eb; display: flex; align-items: center; gap: 8px; letter-spacing: 0.5px; }
        .user-info { color: #64748b; font-size: 13px; display: flex; align-items: center; gap: 4px; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        
        /* 左侧菜单栏像素级优化 */
        .sidebar { width: 210px; background: #f1f5f9; border-right: 1px solid #e2e8f0; padding: 16px 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
        
        /* 写信大按钮 */
        .btn-write { width: 100%; height: 38px; background: #2563eb; color: white; border: 1px solid #1d4ed8; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; margin-bottom: 16px; box-shadow: 0 2px 4px rgba(37, 99, 235, 0.15); transition: all 0.2s ease; }
        .btn-write:hover { background: #1d4ed8; box-shadow: 0 4px 8px rgba(37, 99, 235, 0.25); }
        
        /* 阶梯式完美对齐结构 */
        .menu-item { display: flex; align-items: center; justify-content: space-between; padding: 11px 12px; cursor: pointer; color: #334155; border-radius: 6px; transition: all 0.15s ease; text-decoration: none; font-weight: 500; height: 42px; }
        .menu-item-left { display: flex; align-items: center; gap: 12px; }
        .menu-icon { width: 24px; text-align: center; font-size: 16px; display: inline-block; }
        
        .menu-item:hover { background: #e2e8f0; color: #0f172a; }
        
        /* 激活选中高亮 */
        .menu-item.active { background: #2563eb; color: white !important; font-weight: bold; box-shadow: 0 2px 4px rgba(37, 99, 235, 0.1); }
        .menu-badge { font-weight: bold; font-size: 12px; color: #2563eb; background: #dbeafe; padding: 2px 7px; border-radius: 10px; min-width: 24px; text-align: center; }
        .menu-item.active .menu-badge { color: #2563eb; background: #ffffff; }
        .menu-count-grey { color: #94a3b8; font-size: 12px; font-weight: normal; }
        .menu-item.active .menu-count-grey { color: rgba(255, 255, 255, 0.7); }

        /* 右侧内容业务区 */
        .content { flex: 1; display: flex; flex-direction: column; background: #fff; overflow: hidden; }
        .toolbar { height: 42px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; padding: 0 16px; gap: 8px; }
        .btn-tool { padding: 4px 12px; background: #fff; border: 1px solid #cbd5e1; border-radius: 4px; cursor: pointer; font-size: 12px; color: #334155; transition: all 0.1s ease; }
        .btn-tool:hover { border-color: #94a3b8; background: #f8fafc; }
        
        /* 邮件列表样式 */
        .list-container { flex: 1; overflow-y: auto; }
        .mail-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .mail-table tr { border-bottom: 1px solid #f1f5f9; cursor: pointer; font-size: 13px; transition: background 0.1s; }
        .mail-table tr:hover { background: #f8fafc; }
        .mail-table td { padding: 12px 16px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .col-star { width: 45px; text-align: center; color: #cbd5e1; font-size: 16px; }
        .col-star.starred { color: #f59e0b; }
        .col-from { width: 180px; color: #1e293b; font-weight: 500; }
        .col-subject { color: #2563eb; }
        .col-time { width: 100px; text-align: right; color: #64748b; font-size: 12px; }
        .empty-tip { padding: 60px; text-align: center; color: #94a3b8; font-size: 14px; }

        /* 读信与写信 */
        .view-container { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; background: #fff; }
        .mail-header-box { border-bottom: 1px solid #e2e8f0; padding-bottom: 20px; }
        .mail-title { font-size: 20px; font-weight: bold; margin-bottom: 12px; color: #0f172a; }
        .mail-meta { font-size: 13px; color: #475569; line-height: 2; }
        .mail-body { font-size: 14px; line-height: 1.7; color: #334155; white-space: pre-wrap; padding: 12px 0; }
        
        .form-group { display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #f1f5f9; padding: 10px 0; }
        .form-label { width: 60px; color: #475569; font-size: 13px; font-weight: 500; }
        .form-input { flex: 1; border: none; outline: none; font-size: 14px; padding: 4px; color: #0f172a; }

        /* 富文本工具栏 */
        .editor-toolbar { display: flex; align-items: center; flex-wrap: wrap; background: #f8fafc; border: 1px solid #cbd5e1; border-bottom: none; padding: 8px; gap: 6px; border-top-left-radius: 6px; border-top-right-radius: 6px; }
        .editor-btn { background: none; border: none; padding: 6px 10px; cursor: pointer; font-size: 13px; font-weight: 600; border-radius: 4px; color: #475569; }
        .editor-btn:hover { background: #e2e8f0; color: #0f172a; }
        .editor-select { border: 1px solid #cbd5e1; background: #fff; padding: 4px 6px; font-size: 12px; border-radius: 4px; outline: none; color: #334155; }
        .editor-color-picker { width: 24px; height: 24px; border: none; background: none; cursor: pointer; padding: 0; }
        .editor-container { flex: 1; border: 1px solid #cbd5e1; padding: 16px; font-size: 14px; overflow-y: auto; outline: none; background: #fff; min-height: 280px; border-bottom-left-radius: 6px; border-bottom-right-radius: 6px; color: #334155; line-height: 1.6; }

        .attachment-zone { background: #f8fafc; border: 1px dashed #cbd5e1; padding: 12px; border-radius: 6px; margin-top: 8px; }
        .attachment-item { display: inline-flex; align-items: center; background: #fff; border: 1px solid #e2e8f0; padding: 6px 12px; border-radius: 4px; font-size: 12px; margin-right: 8px; margin-bottom: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.02); }
        .btn-remove-file { margin-left: 10px; color: #ef4444; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="app" v-cloak>
    <div class="header">
        <div class="logo-area">
            <span style="font-weight: 900; color: #2563eb;">MФiL</span> <span style="font-weight: 600; color: #1e293b;">蜀道AI邮箱</span>
        </div>
        <div class="user-info">
            <span v-text="username" style="font-weight: bold;"></span><span>@shudao.ai</span>
            <span style="margin: 0 8px; color: #cbd5e1;">|</span>
            <a href="#" @click="logout" style="color: #2563eb; text-decoration: none; font-weight: 500;">退出</a>
        </div>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <button @click="switchToCompose" class="btn-write">📝 写信</button>
            
            <div class="menu-item" :class="{ active: currentFilter === 'inbox' && viewMode === 'list' }" @click="changeFilter('inbox')">
                <div class="menu-item-left">
                    <span class="menu-icon">📁</span>
                    <span>收件箱</span>
                </div>
                <span class="menu-badge" v-if="currentFilter === 'inbox'" v-text="emails.length"></span>
            </div>

            <div class="menu-item" :class="{ active: currentFilter === 'sent' && viewMode === 'list' }" @click="changeFilter('sent')">
                <div class="menu-item-left">
                    <span class="menu-icon">▲</span>
                    <span>已发送</span>
                </div>
                <span class="menu-badge" v-if="currentFilter === 'sent'" v-text="emails.length"></span>
            </div>
            
            <div class="menu-item" :class="{ active: currentFilter === 'group' && viewMode === 'list' }" @click="changeFilter('group')">
                <div class="menu-item-left">
                    <span class="menu-icon">👥</span>
                    <span>群邮件</span>
                </div>
                <span class="menu-count-grey">0</span>
            </div>

            <div class="menu-item" :class="{ active: currentFilter === 'draft' && viewMode === 'list' }" @click="changeFilter('draft')">
                <div class="menu-item-left">
                    <span class="menu-icon">📄</span>
                    <span>草稿箱</span>
                </div>
            </div>
            
            <div class="menu-item" :class="{ active: currentFilter === 'trash' && viewMode === 'list' }" @click="changeFilter('trash')">
                <div class="menu-item-left">
                    <span class="menu-icon">🗑️</span>
                    <span>已删除</span>
                </div>
                <span class="menu-badge" style="color: #64748b; background: #e2e8f0;" v-if="currentFilter === 'trash'" v-text="emails.length"></span>
            </div>

            <div class="menu-item" :class="{ active: currentFilter === 'starred' && viewMode === 'list' }" @click="changeFilter('starred')">
                <div class="menu-item-left">
                    <span class="menu-icon">⭐</span>
                    <span>星标邮件</span>
                </div>
            </div>
            
            <div class="menu-item" :class="{ active: currentFilter === 'vip' && viewMode === 'list' }" @click="changeFilter('vip')">
                <div class="menu-item-left">
                    <span class="menu-icon">🔖</span>
                    <span>重要联系人</span>
                </div>
            </div>
        </div>

        <div class="content">
            <template v-if="viewMode === 'list'">
                <div class="toolbar">
                    <button class="btn-tool" @click="fetchEmails">刷新</button>
                </div>
                <div class="list-container">
                    <div v-if="emails.length === 0" class="empty-tip">暂无邮件</div>
                    <table v-else class="mail-table">
                        <tbody>
                            <tr v-for="mail in emails" :key="mail.id">
                                <td class="col-star" :class="{ starred: mail.is_starred }" @click.stop="toggleStar(mail)">
                                    {{ mail.is_starred ? '★' : '☆' }}
                                </td>
                                <td class="col-from" @click="readMail(mail)">
                                    {{ currentFilter === 'sent' ? '投递至: ' + mail.to_address.replace('_deleted', '') : (mail.from_address ? mail.from_address.replace('_deleted', '') : '') }}
                                </td>
                                <td class="col-subject" @click="readMail(mail)">
                                    {{ mail.subject }} - <span style="color: #64748b; font-weight: normal;" v-text="mail.body_text"></span>
                                </td>
                                <td class="col-time" @click="readMail(mail)">
                                    {{ formatTime(mail.received_at) }}
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </template>

            <template v-else-if="viewMode === 'read'">
                <div class="toolbar">
                    <button class="btn-tool" @click="viewMode = 'list'">返回列表</button>
                    <button v-if="currentFilter === 'sent' || currentFilter === 'draft'" class="btn-tool" @click="editAgain(activeMail)" style="background: #eff6ff; color: #2563eb; font-weight: bold; border-color: #bfdbfe;">📝 再次编辑</button>
                    <button class="btn-tool" @click="deleteMail(activeMail)">
                        {{ currentFilter === 'trash' ? '💥 彻底删除' : '🗑️ 删除' }}
                    </button>
                </div>
                <div class="view-container">
                    <div class="mail-header-box">
                        <div class="mail-title" v-text="activeMail.subject"></div>
                        <div class="mail-meta">
                            <div><strong>发件人：</strong>{{ activeMail.from_address.replace('_deleted', '') }}</div>
                            <div><strong>收件人：</strong>{{ activeMail.to_address.replace('_deleted', '') }}</div>
                            <div><strong>时 间：</strong>{{ activeMail.received_at }}</div>
                        </div>
                    </div>
                    <div class="mail-body" v-html="activeMail.body_text"></div>
                </div>
            </template>

            <template v-else-if="viewMode === 'compose'">
                <div class="toolbar">
                    <button class="btn-tool" @click="sendMail" style="background: #2563eb; color: white; font-weight: bold; border-color: #1d4ed8;">立即发送</button>
                    <button class="btn-tool" @click="triggerFileInput">📎 添加附件</button>
                    <input type="file" ref="fileInput" @change="handleFileChange" style="display: none;" multiple>
                    <button class="btn-tool" @click="viewMode = 'list'">取消</button>
                </div>
                <div class="view-container">
                    <div class="form-group">
                        <span class="form-label">收件人</span>
                        <input type="text" v-model="composeData.to" class="form-input" placeholder="输入收件人地址...">
                    </div>
                    <div class="form-group">
                        <span class="form-label">主题</span>
                        <input type="text" v-model="composeData.subject" class="form-input" placeholder="输入邮件主题...">
                    </div>
                    
                    <div v-if="attachedFiles.length > 0" class="attachment-zone">
                        <div class="attachment-item" v-for="(file, index) in attachedFiles" :key="index">
                            <span>📄 {{ file.filename }} ({{ (file.size / 1024).toFixed(1) }} KB)</span>
                            <span class="btn-remove-file" @click="removeFile(index)">×</span>
                        </div>
                    </div>

                    <div style="display: flex; flex-direction: column; margin-top: 10px; flex: 1;">
                        <div class="editor-toolbar">
                            <select class="editor-select" @change="execEditorCommand('fontName', $event.target.value)">
                                <option value="Arial">默认字体</option>
                                <option value="Microsoft YaHei">微软雅黑</option>
                                <option value="SimSun">宋体</option>
                                <option value="Courier New">等宽字体</option>
                            </select>
                            <select class="editor-select" @change="execEditorCommand('fontSize', $event.target.value)">
                                <option value="3">字号</option>
                                <option value="2">小</option>
                                <option value="4">中</option>
                                <option value="6">大</option>
                            </select>
                            <div style="width: 1px; height: 16px; background: #cbd5e1; margin: 0 4px;"></div>
                            <button class="editor-btn" style="font-weight: bold;" @click="execEditorCommand('bold')">B</button>
                            <button class="editor-btn" style="font-style: italic;" @click="execEditorCommand('italic')">I</button>
                            <button class="editor-btn" style="text-decoration: underline;" @click="execEditorCommand('underline')">U</button>
                            <button class="editor-btn" style="text-decoration: line-through;" @click="execEditorCommand('strikeThrough')">S</button>
                            <div style="width: 1px; height: 16px; background: #cbd5e1; margin: 0 4px;"></div>
                            <span style="font-size: 12px; color: #64748b;">🎨 文本色:</span>
                            <input type="color" class="editor-color-picker" @input="execEditorCommand('foreColor', $event.target.value)">
                            <div style="width: 1px; height: 16px; background: #cbd5e1; margin: 0 4px;"></div>
                            <button class="editor-btn" @click="execEditorCommand('insertUnorderedList')">• 列表</button>
                            <button class="editor-btn" @click="execEditorCommand('justifyLeft')">⇐ 左对齐</button>
                            <button class="editor-btn" @click="execEditorCommand('justifyCenter')">⇔ 居中</button>
                            <button class="editor-btn" @click="execEditorCommand('justifyRight')">⇒ 右对齐</button>
                        </div>
                        <div class="editor-container" contenteditable="true" ref="editorBox"></div>
                    </div>
                </div>
            </template>
        </div>
    </div>
</div>

<script>
    const API_BASE = window.location.origin;

    // 🔒 优先验证拦截，确保安全第一防线
    if (!localStorage.getItem('mail_username')) {
        window.location.href = '/login.html';
    }

    new Vue({
        el: '#app',
        data: {
            username: localStorage.getItem('mail_username') || 'admin',
            currentFilter: 'inbox',
            viewMode: 'list',
            emails: [],
            activeMail: null,
            composeData: { to: '', subject: '' },
            attachedFiles: []
        },
        created() {
            if(localStorage.getItem('mail_username')) { this.fetchEmails(); }
        },
        methods: {
            fetchEmails() {
                axios.get(`${API_BASE}/api/emails`, {
                    params: { username: this.username, filter: this.currentFilter }
                })
                .then(res => { this.emails = res.data; })
                .catch(err => { alert('获取邮件故障: ' + err.message); });
            },
            changeFilter(filterType) {
                this.currentFilter = filterType;
                this.viewMode = 'list';
                this.fetchEmails();
            },
            switchToCompose() {
                this.composeData = { to: '', subject: '' };
                this.attachedFiles = [];
                this.viewMode = 'compose';
                this.$nextTick(() => { if(this.$refs.editorBox) this.$refs.editorBox.innerHTML = ''; });
            },
            readMail(mail) {
                this.activeMail = mail;
                this.viewMode = 'read';
            },
            editAgain(mail) {
                this.composeData = {
                    to: mail.to_address.replace('_deleted', ''),
                    subject: mail.subject
                };
                this.attachedFiles = [];
                this.viewMode = 'compose';
                this.$nextTick(() => {
                    if (this.$refs.editorBox) {
                        this.$refs.editorBox.innerHTML = mail.body_text;
                    }
                });
            },
            execEditorCommand(cmd, value = null) {
                document.execCommand(cmd, false, value);
            },
            triggerFileInput() { this.$refs.fileInput.click(); },
            handleFileChange(event) {
                const files = event.target.files;
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        this.attachedFiles.push({
                            filename: file.name,
                            content: e.target.result.split(',')[1],
                            size: file.size
                        });
                    };
                    reader.readAsDataURL(file);
                }
            },
            removeFile(index) { this.attachedFiles.splice(index, 1); },
            sendMail() {
                const richHtmlContent = this.$refs.editorBox.innerHTML;
                if (!this.composeData.to || !richHtmlContent || richHtmlContent === '<br>') {
                    alert('请补全收件人和内容');
                    return;
                }
                axios.post(`${API_BASE}/api/send`, {
                    from_user: this.username,
                    to_email: this.composeData.to,
                    subject: this.composeData.subject || '(无主题)',
                    content: richHtmlContent,
                    attachments: this.attachedFiles
                })
                .then(res => {
                    alert(res.data.message || '发送成功！');
                    this.changeFilter('sent');
                })
                .catch(err => { alert('发送失败: ' + (err.response ? err.response.data.message : err.message)); });
            },
            toggleStar(mail) {
                const targetValue = mail.is_starred ? 0 : 1;
                mail.is_starred = targetValue;
                axios.patch(`${API_BASE}/api/emails/status`, { id: mail.id, field: 'is_starred', value: targetValue });
            },
            deleteMail(mail) {
                if (this.currentFilter === 'trash') {
                    if (!confirm('确定要永久删除该邮件吗？')) return;
                    axios.patch(`${API_BASE}/api/emails/status`, { id: mail.id, field: 'permanent_delete', value: 'true' })
                    .then(() => { this.viewMode = 'list'; this.fetchEmails(); });
                } else {
                    axios.patch(`${API_BASE}/api/emails/status`, { id: mail.id, field: 'execute_delete', value: this.username })
                    .then(() => { this.viewMode = 'list'; this.fetchEmails(); });
                }
            },
            formatTime(timeStr) {
                if (!timeStr) return '';
                const date = new Date(timeStr);
                return (date.getMonth() + 1) + '月' + date.getDate() + '日';
            },
            logout() { localStorage.removeItem('mail_username'); window.location.href = '/login.html'; }
        }
    });
</script>
</body>
</html>
